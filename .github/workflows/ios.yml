name: ios

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'
      - name: Install SwiftLint & SwiftFormat
        run: brew install swiftlint swiftformat
      - name: Compile shared module (all iOS targets)
        run: ./gradlew :shared:compileKotlinIosArm64 :shared:compileKotlinIosSimulatorArm64 --no-daemon
      - name: SwiftFormat lint
        run: swiftformat --lint iosApp
      - name: SwiftLint
        run: swiftlint --quiet
      - name: Build & test iosApp
        run: |
          xcodebuild \
            -project iosApp/iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            clean build test
